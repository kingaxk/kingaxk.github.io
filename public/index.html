function describeMealSelection(mealData){
  if(!mealData || !mealData.recipeId) return "";
  const recipe = findRecipe(mealData.recipeId);
  if(!recipe) return "";
  const parts = [recipe.name];
  const variantParts = [];
  (recipe.variantGroups||[]).forEach(function(g){
    const chosen = mealData.variants && mealData.variants[g.id];
    const opt = chosen && g.options.find(function(o){ return o.id===chosen; });
    if(opt && opt.id!=="brak") variantParts.push(g.label+": "+opt.label);
  });
  if(variantParts.length) parts.push("("+variantParts.join(", ")+")");
  const addons = mealData.addons || {};
  const addonNames = Object.keys(addons).map(function(id){
    const addon = findAddon(id);
    if(!addon) return null;
    const sel = addons[id];
    let label = addon.name;
    if(addon.variantGroups && addon.variantGroups.length){
      const extra = addon.variantGroups.map(function(g){
        const chosen = sel.variants && sel.variants[g.id];
        const opt = chosen && g.options.find(function(o){ return o.id===chosen; });
        return opt ? opt.label : null;
      }).filter(Boolean);
      if(extra.length) label += " ("+extra.join(", ")+")";
    }
    return label;
  }).filter(Boolean);
  if(addonNames.length) parts.push("+ Dodatki: "+addonNames.join(", "));
  return parts.join(" ");
}

function computeMealIngredients(mealData){
  const results = [];
  if(!mealData || !mealData.recipeId) return results;
  const recipe = findRecipe(mealData.recipeId);
  if(!recipe) return results;
  const scale = 1/(recipe.portions||1);
  (recipe.fixed||[]).forEach(function(ing){ results.push({ name:ing.name, amount:ing.amount*scale, unit:ing.unit, source:recipe.name }); });
  (recipe.variantGroups||[]).forEach(function(g){
    const chosen = mealData.variants && mealData.variants[g.id];
    const opt = chosen && g.options.find(function(o){ return o.id===chosen; });
    if(opt){ (opt.ingredients||[]).forEach(function(ing){ results.push({ name:ing.name, amount:ing.amount*scale, unit:ing.unit, source:recipe.name }); }); }
  });
  const addons = mealData.addons || {};
  Object.keys(addons).forEach(function(addonId){
    const addon = findAddon(addonId);
    if(!addon) return;
    const aScale = 1/(addon.portions||1);
    const addonSel = addons[addonId] || {};
    (addon.fixed||[]).forEach(function(ing){ results.push({ name:ing.name, amount:ing.amount*aScale, unit:ing.unit, source:addon.name }); });
    (addon.variantGroups||[]).forEach(function(g){
      const chosen = addonSel.variants && addonSel.variants[g.id];
      const opt = chosen && g.options.find(function(o){ return o.id===chosen; });
      if(opt){ (opt.ingredients||[]).forEach(function(ing){ results.push({ name:ing.name, amount:ing.amount*aScale, unit:ing.unit, source:addon.name }); }); }
    });
  });
  return results;
}

/* ============================== DATE HELPERS ============================== */
function pad(n){ return n<10 ? "0"+n : ""+n; }
function fmtDate(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function todayStr(){ return fmtDate(new Date()); }
function parseDateStr(s){ const p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
function addDays(dateStr,n){ const d=parseDateStr(dateStr); d.setDate(d.getDate()+n); return fmtDate(d); }
function lastNDays(n,endDateStr){ const arr=[]; for(let i=n-1;i>=0;i--) arr.push(addDays(endDateStr,-i)); return arr; }
function dateRangeList(startStr,endStr){ const arr=[]; let cur=startStr, guard=0; while(cur<=endStr && guard<400){ arr.push(cur); cur=addDays(cur,1); guard++; } return arr; }
function humanDate(dateStr){ return parseDateStr(dateStr).toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long"}); }
function humanDateShort(dateStr){ return parseDateStr(dateStr).toLocaleDateString("pl-PL",{day:"numeric",month:"short"}); }

function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
}

function doSignIn(){
  state.screen = "loading";
  state.errorMsg = "";
  render();
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e){
    state.screen = "signin";
    state.errorMsg = "Logowanie nie powiodło się lub odmówiono dostępu.";
    render();
  });
  // onAuthStateChanged (registered at boot) picks up success and loads data from there.
}
function doSignOut(){
  auth.signOut();
}

/* ============================== FIRESTORE DATA LAYER ============================== */
let sheetRows = [];
let rowIndexMap = {};
const pendingSync = new Set();
let syncStatus = "idle";

function keyFor(date,itemId){ return date+"|"+itemId; }
function entryDocId(date,itemId){ return date+"_"+itemId; }

async function fetchAllRows(){
  const snap = await db.collection("users").doc(currentUser.uid).collection("entries").get();
  sheetRows = [];
  rowIndexMap = {};
  snap.forEach(function(doc){
    const d = doc.data();
    sheetRows.push(d);
    rowIndexMap[keyFor(d.Date, d.ItemId)] = d;
  });
}

function getDayItems(dateStr){
  const items = {};
  sheetRows.forEach(function(r){
    if(r.Date===dateStr){
      try{ items[r.ItemId] = r.ExtraJSON ? JSON.parse(r.ExtraJSON) : {}; }catch(e){ items[r.ItemId] = {}; }
    }
  });
  return { items: items };
}
function getEffectiveList(item){
  const defaultList = item.type==="meal" ? (item.options||[]) : (item.subItems||[]);
  if(!item.editable) return defaultList;
  let r = rowIndexMap[keyFor("_config","list_"+item.id)];
  if(!r && item.id==="supplements"){ r = rowIndexMap[keyFor("_config","supplements")]; } // backward compat with earlier version
  if(r && r.ExtraJSON){
    try{ const v = JSON.parse(r.ExtraJSON); if(Array.isArray(v)) return v; }catch(e){}
  }
  return defaultList;
}
function listDates(){
  const set = new Set();
  sheetRows.forEach(function(r){ if(r.Date && r.Date!=="_config") set.add(r.Date); });
  return Array.from(set);
}

// Firestore .set() on a deterministic doc ID (date_itemId) is a plain overwrite —
// unlike the old Sheets version, there's no row number to discover and no race
// condition possible: whichever write reaches the server last simply wins.
async function pushRow(date, itemId, category, itemName, done, note, extraObj){
  const k = keyFor(date, itemId);
  const localRow = { Date:date, ItemId:itemId, Category:category||"", ItemName:itemName||"", Done: done?"TRUE":"FALSE", Note: note||"", ExtraJSON: JSON.stringify(extraObj), UpdatedAt: new Date().toISOString() };
  const idx = sheetRows.findIndex(function(r){ return r.Date===date && r.ItemId===itemId; });
  if(idx===-1) sheetRows.push(localRow); else sheetRows[idx] = localRow;
  rowIndexMap[k] = localRow;

  pendingSync.add(k);
  syncStatus = "saving";
  render();

  try{
    await db.collection("users").doc(currentUser.uid).collection("entries").doc(entryDocId(date,itemId)).set(localRow);
    pendingSync.delete(k);
    syncStatus = pendingSync.size ? "saving" : "saved";
  }catch(e){
    pendingSync.delete(k);
    syncStatus = "error";
  }
  render();
}

function updateDayItem(dateStr, itemId, updater){
  const day = getDayItems(dateStr);
  const prevItems = day.items || {};
  const newData = updater(prevItems[itemId] || {});
  const meta = findItemMeta(itemId);
  const done = isItemDone(meta, newData);
  const note = meta.type==="note" ? (newData.note||"") : "";
  pushRow(dateStr, itemId, meta.catName, meta.name, done, note, newData);
}
function saveEffectiveList(item, list){
  pushRow("_config", "list_"+item.id, "", "", false, "", list);
}

/* ============================== COMPLETION LOGIC ============================== */
function isItemDone(item,data){
  if(!data) return false;
  switch(item.type){
    case "simple": case "note": return !!data.done;
    case "nested": { const subs=getEffectiveList(item); if(!subs.length) return false; return subs.every(function(s){return data.subDone&&data.subDone[s];}); }
    case "log": return !!(data.logEntries && data.logEntries.length>0);
    case "meal": return !!data.mealValue;
    case "recipe_meal": return !!(data && data.recipeId);
    default: return false;
  }
}
function computeDayTotals(dayData){
  let done=0,total=0; const perCategory={};
  const items=(dayData && dayData.items)||{};
  CATEGORIES.forEach(function(cat){
    let cDone=0;
    cat.items.forEach(function(item){ total++; if(isItemDone(item,items[item.id])){done++;cDone++;} });
    perCategory[cat.id] = { done:cDone, total:cat.items.length, pct: cat.items.length? cDone/cat.items.length : 0 };
  });
  return { done:done, total:total, pct: total? done/total : 0, perCategory:perCategory };
}

/* ============================== UTIL ============================== */
function escapeHTML(str){
  return String(str==null?"":str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function downloadFile(filename,content,mime){
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function csvEscape(v){ const s=String(v==null?"":v); if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"'; return s; }
function checkSVG(){ return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 12l6 6L20 6" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }

/* ============================== STATE ============================== */
const state = {
  screen: "boot", // boot | signin | loading | error | app
  errorMsg: "",
  activeTab: "today",
  viewDate: todayStr(),
  expandedItem: null,
  collapsedCats: {},
  settingsOpen: false,
  notesFilter: "all",
  dashRange: "week",
  dashCustomStart: addDays(todayStr(),-13),
  dashCustomEnd: todayStr(),
  shopStart: todayStr(),
  shopEnd: addDays(todayStr(),6),
  settingsStatus: "",
  manageListId: null,
};

function render(){
  const app = document.getElementById("app");
  if(state.screen==="signin"){ app.innerHTML = renderSignIn(); return; }
  if(state.screen==="loading" || state.screen==="boot"){ app.innerHTML = '<div class="rd-loading" style="padding-top:80px;">Ładowanie…</div>'; return; }
  if(state.screen==="error"){ app.innerHTML = renderConnError(); return; }

  let body = "";
  if(state.activeTab==="today") body = renderToday();
  else if(state.activeTab==="notes") body = renderNotes();
  else if(state.activeTab==="dashboard") body = renderDashboard();
  else body = renderShopping();

  app.innerHTML =
    '<div class="rd-root">' +
      renderHeader() +
      '<main class="rd-main">'+body+'</main>' +
      renderBottomNav() +
      (state.settingsOpen ? renderSettings() : "") +
    '</div>';
}

  return '<div class="rd-header"><span class="rd-title">Rytuały dnia</span>' +

    '<button class="rd-gear" data-action="open-settings" aria-label="Ustawienia">&#9881;</button></div>';
}
function renderBottomNav(){
  const tabs=[["today","Dziś"],["notes","Notatki"],["dashboard","Dashboard"],["shopping","Zakupy"]];
  return '<nav class="rd-bottomnav">' + tabs.map(function(t){
    return '<button class="rd-tab'+(state.activeTab===t[0]?' active':'')+'" data-action="set-tab" data-tab="'+t[0]+'">'+t[1]+'</button>';

/* ============================== TODAY VIEW ============================== */
function renderToday(){
  const dayData = getDayItems(state.viewDate);
  const totals = computeDayTotals(dayData);
  const isToday = state.viewDate === todayStr();

  let html = '<div class="rd-daynav">' +
    '<button data-action="nav-date" data-dir="-1">&#8249;</button>' +
    '<div><div class="rd-daydate">'+humanDate(state.viewDate)+'</div>' +
    (!isToday ? '<button class="rd-backtoday" data-action="nav-date-today">Wróć do dziś</button>' : '') +
    '</div>' +
    '<button data-action="nav-date" data-dir="1">&#8250;</button></div>';

  html += '<div class="rd-dayarc">' + CATEGORIES.map(function(cat){
    const pct = totals.perCategory[cat.id].pct;
    const h = Math.max(pct*100,6);
    return '<button class="rd-dayarc-seg" data-action="jump-cat" data-cat="'+cat.id+'" title="'+escapeHTML(cat.name)+'" style="background:'+CATEGORY_HEX[cat.id]+'22"><div class="rd-dayarc-fill" style="height:'+h+'%;background:'+CATEGORY_HEX[cat.id]+'"></div></button>';
  }).join('') + '</div>';

  html += '<div class="rd-daysummary">'+totals.done+'/'+totals.total+' zrealizowanych dziś</div>';
  CATEGORIES.forEach(function(cat){ html += renderCategory(cat, dayData); });
  return html;
}

function renderCategory(cat, dayData){
  const items = (dayData && dayData.items) || {};
  const collapsed = !!state.collapsedCats[cat.id];
  const doneCount = cat.items.filter(function(it){return isItemDone(it, items[it.id]);}).length;
  const colorVar = CATEGORY_HEX[cat.id];

  let html = '<section class="rd-cat" id="cat-'+cat.id+'">' +
    '<button class="rd-cat-head" data-action="toggle-cat" data-cat="'+cat.id+'">' +
    '<span class="rd-cat-bar" style="background:'+colorVar+'"></span>' +
    '<span class="rd-cat-name">'+escapeHTML(cat.name)+'</span>' +
    '<span class="rd-cat-count">'+doneCount+'/'+cat.items.length+'</span>' +
    '<span class="rd-cat-chev">'+(collapsed?'&#9656;':'&#9662;')+'</span>' +
    '</button>';

  if(!collapsed){
    html += '<div class="rd-cat-body">';
    cat.items.forEach(function(item){ html += renderItemRow(item, items[item.id]||{}, colorVar); });
    html += '</div>';
  }
  html += '</section>';
  return html;
}

function renderItemRow(item, data, color){
  const done = isItemDone(item, data);
  const expanded = state.expandedItem === item.id;
  const checkBtn = function(interactive, action){
    return '<button class="rd-check'+(done?' done':'')+'" style="--cat-color:'+color+'" '+
    (interactive ? 'data-action="'+action+'" data-item="'+item.id+'"' : 'disabled') + '>' + checkSVG() + '</button>';
  };

  if(item.type==="simple"){
    return '<div class="rd-row">' + checkBtn(true,"toggle-done") +
      '<span class="rd-row-name">'+escapeHTML(item.name)+'</span></div>';
  }

  if(item.type==="note"){
    let html = '<div><div class="rd-row">' + checkBtn(true,"toggle-done") +
      '<button class="rd-row-main" data-action="toggle-expand" data-item="'+item.id+'">' +
      '<span class="rd-row-name">'+escapeHTML(item.name)+'</span>' +
      '<span class="rd-row-right">' + (data.note ? '<span class="rd-note-dot"></span>' : '') +
      '<span class="rd-chev">'+(expanded?'&#9662;':'&#9656;')+'</span></span></button></div>';
    if(expanded){
      html += '<div class="rd-detail"><textarea class="rd-textarea" rows="3" placeholder="'+escapeHTML(item.notePrompt||"Dodaj notatkę…")+'" data-note-item="'+item.id+'">'+escapeHTML(data.note||"")+'</textarea></div>';
    }
    html += '</div>';
    return html;
  }

  if(item.type==="nested"){
    const subs = getEffectiveList(item);
    const doneSubs = subs.filter(function(s){return data.subDone && data.subDone[s];}).length;
    let html = '<div><div class="rd-row">' + checkBtn(false,"") +
      '<button class="rd-row-main" data-action="toggle-expand" data-item="'+item.id+'">' +
      '<span class="rd-row-name">'+escapeHTML(item.name)+'</span>' +
      '<span class="rd-row-right"><span class="rd-count-badge">'+doneSubs+'/'+subs.length+'</span>' +
      '<span class="rd-chev">'+(expanded?'&#9662;':'&#9656;')+'</span></span></button></div>';
    if(expanded){
      html += '<div class="rd-detail"><div class="rd-sublist">';
      if(subs.length===0 && item.editable){
        html += '<span class="rd-hint">Brak pozycji — dodaj je w Ustawieniach (ikona zębatki, sekcja "Zarządzaj listami").</span>';
      }
      subs.forEach(function(s,idx){
        const checked = !!(data.subDone && data.subDone[s]);
        html += '<label class="rd-sublabel"><input type="checkbox" '+(checked?'checked':'')+' data-action="toggle-sub" data-item="'+item.id+'" data-sub-index="'+idx+'"><span>'+escapeHTML(s)+'</span></label>';
      });
      html += '</div></div>';
    }
    html += '</div>';
    return html;
  }

  if(item.type==="log"){
    const entries = data.logEntries || [];
    let html = '<div><div class="rd-row">' + checkBtn(false,"") +
      '<button class="rd-row-main" data-action="toggle-expand" data-item="'+item.id+'">' +
      '<span class="rd-row-name">'+escapeHTML(item.name)+'</span>' +
      '<span class="rd-row-right"><span class="rd-count-badge">'+entries.length+' '+(entries.length===1?'seria':'serie')+'</span>' +
      '<span class="rd-chev">'+(expanded?'&#9662;':'&#9656;')+'</span></span></button></div>';
    if(expanded){
      html += '<div class="rd-detail">';
      entries.forEach(function(en,idx){
        html += '<div class="rd-logentry"><span>'+escapeHTML(en.exercise||"")+'</span><span>'+escapeHTML(en.weight||"")+'</span><span>x'+escapeHTML(en.reps||"")+'</span>' +
          '<button data-action="remove-log" data-item="'+item.id+'" data-idx="'+idx+'">&times;</button></div>';
      });
      html += '<div class="rd-logform">' +
        '<input class="rd-log-main" placeholder="Ćwiczenie" id="logdraft-'+item.id+'-exercise">' +
        '<input class="rd-log-sub" placeholder="Ciężar" id="logdraft-'+item.id+'-weight">' +
        '<input class="rd-log-sub" placeholder="Powtórzenia" id="logdraft-'+item.id+'-reps">' +
        '<button class="rd-logadd" style="background:'+color+'" data-action="add-log" data-item="'+item.id+'">+ Dodaj serię</button>' +
        '</div></div>';
    }
    html += '</div>';
    return html;
  }

  if(item.type==="recipe_meal"){
    const recipe = data.recipeId ? findRecipe(data.recipeId) : null;
    let html = '<div><div class="rd-row">' + checkBtn(false,"") +
      '<button class="rd-row-main" data-action="toggle-expand" data-item="'+item.id+'">' +
      '<span class="rd-row-name">'+escapeHTML(item.name)+'</span>' +
      '<span class="rd-row-right"><span class="rd-count-badge">'+(recipe?escapeHTML(recipe.name):'— wybierz —')+'</span>' +
      '<span class="rd-chev">'+(expanded?'&#9662;':'&#9656;')+'</span></span></button></div>';
    if(expanded){
      html += '<div class="rd-detail">';
      html += '<select class="rd-select" style="width:100%;max-width:100%;margin-bottom:10px" data-action="recipe-select" data-item="'+item.id+'"><option value="">— wybierz danie —</option>';
      recipesForMeal(item.mealTag).forEach(function(r){
        html += '<option value="'+r.id+'" '+(data.recipeId===r.id?'selected':'')+'>'+escapeHTML(r.name)+'</option>';
      });
      html += '</select>';
      if(recipe && recipe.variantGroups.length){
        recipe.variantGroups.forEach(function(g){
          const chosen = (data.variants && data.variants[g.id]) || "";
          html += '<div style="margin-bottom:8px"><label class="rd-hint" style="display:block;margin-bottom:4px">'+escapeHTML(g.label)+'</label>' +
            '<select class="rd-select" style="width:100%;max-width:100%" data-action="recipe-variant-select" data-item="'+item.id+'" data-group="'+g.id+'"><option value="">— wybierz —</option>';
          g.options.forEach(function(o){ html += '<option value="'+o.id+'" '+(chosen===o.id?'selected':'')+'>'+escapeHTML(o.label)+'</option>'; });
          html += '</select></div>';
        });
      }
      html += '<label class="rd-h3" style="margin-top:10px">Dodatki</label><div class="rd-sublist">';
      ADDONS.forEach(function(a){
        const sel = data.addons && data.addons[a.id];
        const checked = !!sel;
        html += '<label class="rd-sublabel"><input type="checkbox" '+(checked?'checked':'')+' data-action="recipe-addon-toggle" data-item="'+item.id+'" data-addon="'+a.id+'"><span>'+escapeHTML(a.name)+'</span></label>';
        if(checked && a.variantGroups && a.variantGroups.length){
          a.variantGroups.forEach(function(g){
            const chosenA = (sel.variants && sel.variants[g.id]) || "";
            html += '<select class="rd-select" style="width:calc(100% - 30px);max-width:none;margin:2px 0 6px auto;display:block" data-action="recipe-addon-variant" data-item="'+item.id+'" data-addon="'+a.id+'" data-group="'+g.id+'"><option value="">— '+escapeHTML(g.label)+' —</option>';
            g.options.forEach(function(o){ html += '<option value="'+o.id+'" '+(chosenA===o.id?'selected':'')+'>'+escapeHTML(o.label)+'</option>'; });
            html += '</select>';
          });
        }
      });
      html += '</div></div>';
    }
    html += '</div>';
    return html;
  }
  return "";
}

/* ============================== NOTES VIEW ============================== */
function collectAllNotes(){
  const results = [];
  sheetRows.forEach(function(r){
    if(!r.Date || r.Date==="_config") return;
    const meta = findItemMeta(r.ItemId);
    if(!meta || meta.type!=="note") return;
    if(r.Note && String(r.Note).trim()){
      results.push({ date:r.Date, catId:meta.catId, itemName:meta.name, note:r.Note });
    }
  });
  results.sort(function(a,b){ return b.date.localeCompare(a.date); });
  return results;
}
function renderNotes(){
  const notes = collectAllNotes();
  const filtered = state.notesFilter==="all" ? notes : notes.filter(function(n){return n.catId===state.notesFilter;});

  let html = '<h2 class="rd-h2">Notatki</h2><div class="rd-chips">';
  html += '<button class="rd-chip'+(state.notesFilter==="all"?" active":"")+'" style="'+(state.notesFilter==="all"?"background:var(--accent);border-color:var(--accent)":"")+'" data-action="filter-notes" data-cat="all">Wszystkie</button>';
  CATEGORIES.forEach(function(c){
    const active = state.notesFilter===c.id;
    html += '<button class="rd-chip'+(active?" active":"")+'" style="'+(active?('background:'+CATEGORY_HEX[c.id]+';border-color:'+CATEGORY_HEX[c.id]):'')+'" data-action="filter-notes" data-cat="'+c.id+'">'+escapeHTML(c.name)+'</button>';
  });
  html += '</div>';

  if(filtered.length===0){
    html += '<div class="rd-empty">Brak notatek w tej kategorii — wróć tu, gdy coś zapiszesz przy checkliście.</div>';
  } else {
    filtered.forEach(function(n){
      html += '<button class="rd-notecard" data-action="jump-date" data-date="'+n.date+'">' +
        '<div class="rd-notecard-top"><span class="rd-notecard-item" style="color:'+CATEGORY_HEX[n.catId]+'">'+escapeHTML(n.itemName)+'</span>' +
        '<span class="rd-notecard-date">'+humanDateShort(n.date)+'</span></div>' +
        '<p class="rd-notecard-text">'+escapeHTML(n.note)+'</p></button>';
    });
  }
  return html;
}

/* ============================== DASHBOARD VIEW ============================== */
function renderDashboard(){
  let dateList;
  if(state.dashRange==="week") dateList = lastNDays(7, todayStr());
  else if(state.dashRange==="month") dateList = lastNDays(30, todayStr());
  else dateList = dateRangeList(state.dashCustomStart, state.dashCustomEnd);

  const days = dateList.map(function(d){ return { date:d, totals: computeDayTotals(getDayItems(d)) }; });

  let streak = 0, cursor = todayStr();
  for(let i=0;i<400;i++){
    const t = computeDayTotals(getDayItems(cursor));
    if(t.done===0) break;
    streak++; cursor = addDays(cursor,-1);
  }

  const avgPct = days.length ? days.reduce(function(s,d){return s+d.totals.pct;},0)/days.length : 0;
  const catAverages = CATEGORIES.map(function(cat){
    const avg = days.length ? days.reduce(function(s,d){return s+d.totals.perCategory[cat.id].pct;},0)/days.length : 0;
    return { id:cat.id, name:cat.name, pct: Math.round(avg*100) };
  });
  const sortedDays = days.slice().sort(function(a,b){return b.totals.pct-a.totals.pct;});
  const best = sortedDays[0], worst = sortedDays[sortedDays.length-1];

  let html = '<h2 class="rd-h2">Dashboard</h2>';
  html += '<div class="rd-rangechips">' +
    ["week","month","custom"].map(function(r){
      const label = r==="week"?"Tydzień":r==="month"?"Miesiąc":"Własny";
      return '<button class="rd-rangechip'+(state.dashRange===r?" active":"")+'" data-action="set-range" data-range="'+r+'">'+label+'</button>';
    }).join('') + '</div>';

  if(state.dashRange==="custom"){
    html += '<div class="rd-daterange">' +
      '<input type="date" value="'+state.dashCustomStart+'" max="'+state.dashCustomEnd+'" data-action="set-custom-start">' +
      '<input type="date" value="'+state.dashCustomEnd+'" min="'+state.dashCustomStart+'" max="'+todayStr()+'" data-action="set-custom-end">' +
      '</div>';
  }

  html += '<div class="rd-stats">' +
    '<div class="rd-stat"><div class="rd-stat-label">Średnia realizacja</div><div class="rd-stat-value">'+Math.round(avgPct*100)+'%</div></div>' +
    '<div class="rd-stat"><div class="rd-stat-label">🔥 Passa</div><div class="rd-stat-value">'+streak+' '+(streak===1?'dzień':'dni')+'</div></div>' +
    '</div>';

  html += '<h3 class="rd-h3">Realizacja wg kategorii</h3><div class="rd-barlist">';
  catAverages.forEach(function(c){
    html += '<div class="rd-bar-row"><span class="rd-bar-name">'+escapeHTML(c.name)+'</span>' +
      '<div class="rd-bar-track"><div class="rd-bar-fill" style="width:'+c.pct+'%;background:'+CATEGORY_HEX[c.id]+'"></div></div>' +
      '<span class="rd-bar-pct">'+c.pct+'%</span></div>';
  });
  html += '</div>';

  html += '<h3 class="rd-h3">Dni w tym zakresie</h3><div class="rd-heatmap">';
  days.forEach(function(d){
    const alpha = Math.round(30 + d.totals.pct*70).toString(16);
    const bg = d.totals.pct===0 ? 'var(--line)' : ('#8B5A6B'+alpha);
    html += '<button class="rd-heatcell" style="background:'+bg+'" title="'+d.date+': '+Math.round(d.totals.pct*100)+'%" data-action="jump-date" data-date="'+d.date+'"></button>';
  });
  html += '</div>';

  if(best && worst){
    html += '<div class="rd-bestworst">' +
      '<span>Najlepszy dzień: <strong>'+humanDateShort(best.date)+'</strong> ('+Math.round(best.totals.pct*100)+'%)</span>' +
      '<span>Najsłabszy dzień: <strong>'+humanDateShort(worst.date)+'</strong> ('+Math.round(worst.totals.pct*100)+'%)</span>' +
      '</div>';
  }
  return html;
}

/* ============================== SHOPPING LIST VIEW ============================== */
const MEAL_SLOT_IDS = ["breakfast","lunch","dinner","supper"];

// Defensive fallback: if an ingredient ever ends up using a spoon/cup unit
// (instead of the canonical g/ml from recipes-data.js), convert it to ml here
// so it still merges with other ml-based entries of the same ingredient,
// rather than silently showing up as a separate, easy-to-miss line.
const VOLUME_TO_ML = { "łyżka":15, "łyżeczka":5, "szklanka":250 };
function normalizeIngredient(ing){
  if(VOLUME_TO_ML[ing.unit]){
    return { name: ing.name, unit: "ml", amount: ing.amount * VOLUME_TO_ML[ing.unit] };
  }
  return ing;
}

function computeShoppingList(startDate, endDate){
  const dates = dateRangeList(startDate, endDate);
  const allIngredients = [];
  const recipeUsage = {};
  const addonUsage = {};

  dates.forEach(function(d){
    const dayItems = getDayItems(d).items;
    MEAL_SLOT_IDS.forEach(function(slotId){
      const mealData = dayItems[slotId];
      if(!mealData || !mealData.recipeId) return;
      recipeUsage[mealData.recipeId] = (recipeUsage[mealData.recipeId]||0)+1;
      computeMealIngredients(mealData).forEach(function(ing){ allIngredients.push(ing); });
      const addons = mealData.addons || {};
      Object.keys(addons).forEach(function(aid){ addonUsage[aid] = (addonUsage[aid]||0)+1; });
    });
  });

  const merged = {};
  allIngredients.forEach(function(ing){
    const norm = normalizeIngredient(ing);
    const cleanName = norm.name.trim();
    const key = cleanName.toLowerCase()+"|"+norm.unit;
    if(!merged[key]) merged[key] = { name:cleanName, unit:norm.unit, amount:0 };
    merged[key].amount += norm.amount;
  });
  const list = Object.keys(merged).map(function(k){ return merged[k]; }).sort(function(a,b){ return a.name.localeCompare(b.name,"pl"); });

  return { list:list, recipeUsage:recipeUsage, addonUsage:addonUsage };
}

function fmtAmount(n){
  const r = Math.round(n*10)/10;
  return (r % 1 === 0) ? String(r) : String(r).replace(".",",");
}

function renderShopping(){
  const result = computeShoppingList(state.shopStart, state.shopEnd);
  let html = '<h2 class="rd-h2">Lista zakupów</h2>';
  html += '<div class="rd-daterange">' +
    '<input type="date" value="'+state.shopStart+'" max="'+state.shopEnd+'" data-action="set-shop-start">' +
    '<input type="date" value="'+state.shopEnd+'" min="'+state.shopStart+'" data-action="set-shop-end">' +
    '</div>';

  if(result.list.length===0){
    html += '<div class="rd-empty">Brak zaplanowanych posiłków (z wybranym daniem) w tym zakresie dat.</div>';
    return html;
  }

  html += '<h3 class="rd-h3">Składniki do kupienia</h3><div class="rd-cat-body" style="margin-bottom:20px">';
  result.list.forEach(function(ing,idx){
    html += '<div class="rd-row"'+(idx===result.list.length-1?' style="border-bottom:none"':'')+'>' +
      '<span class="rd-row-name">'+escapeHTML(ing.name)+'</span>' +
      '<span class="rd-count-badge" style="margin-left:auto">'+fmtAmount(ing.amount)+' '+escapeHTML(ing.unit)+'</span></div>';
  });
  html += '</div>';

  const recipeIds = Object.keys(result.recipeUsage);
  if(recipeIds.length){
    html += '<h3 class="rd-h3">Dania w tym zakresie</h3><div class="rd-cat-body" style="margin-bottom:20px">';
    recipeIds.forEach(function(rid,idx){
      const recipe = findRecipe(rid);
      if(!recipe) return;
      const count = result.recipeUsage[rid];
      const batches = fmtAmount(count/(recipe.portions||1));
      html += '<div class="rd-row"'+(idx===recipeIds.length-1?' style="border-bottom:none"':'')+'>' +
        '<span class="rd-row-name">'+escapeHTML(recipe.name)+'</span>' +
        '<span class="rd-count-badge" style="margin-left:auto;text-align:right">'+count+' '+(count===1?'porcja':'porcje')+'<br>(≈ '+batches+'× cały przepis)</span></div>';
    });
    html += '</div>';
  }

  const addonIds = Object.keys(result.addonUsage);
  if(addonIds.length){
    html += '<h3 class="rd-h3">Dodatki w tym zakresie</h3><div class="rd-cat-body">';
    addonIds.forEach(function(aid,idx){
      const addon = findAddon(aid);
      if(!addon) return;
      const count = result.addonUsage[aid];
      html += '<div class="rd-row"'+(idx===addonIds.length-1?' style="border-bottom:none"':'')+'>' +
        '<span class="rd-row-name">'+escapeHTML(addon.name)+'</span>' +
        '<span class="rd-count-badge" style="margin-left:auto">×'+count+'</span></div>';
    });
    html += '</div>';
  }

  return html;
}

/* ============================== SETTINGS SHEET ============================== */
function renderSettings(){
  const editableItems = ALL_ITEMS.filter(function(it){ return it.editable; });
  let html = '<div class="rd-overlay" data-action="close-settings-overlay"><div class="rd-sheet" data-action="noop">' +
    '<div class="rd-sheet-top"><h2 class="rd-sheet-title">Ustawienia</h2>' +
    '<button class="rd-sheet-close" data-action="close-settings">&times;</button></div>';

  html += '<h3 class="rd-h3">Zarządzaj listami</h3><div class="rd-chips">';
  editableItems.forEach(function(it){
    const active = state.manageListId===it.id;
    html += '<button class="rd-chip'+(active?" active":"")+'" style="'+(active?"background:var(--accent);border-color:var(--accent)":"")+'" data-action="pick-list" data-item="'+it.id+'">'+escapeHTML(it.name)+'</button>';
  });
  html += '</div>';

  if(state.manageListId){
    const item = findItemMeta(state.manageListId);
    const list = getEffectiveList(item);
    html += '<div class="rd-supplist">';
    if(list.length===0){
      html += '<span class="rd-hint">Ta lista jest pusta.</span>';
    } else {
      list.forEach(function(s,idx){
        html += '<div class="rd-suppitem"><span>'+escapeHTML(s)+'</span><button data-action="remove-list-item" data-idx="'+idx+'">Usuń</button></div>';
      });
    }
    html += '</div><div class="rd-suppadd"><input id="new-list-item-input" placeholder="Dodaj pozycję…"><button data-action="add-list-item">+</button></div>';
  }

  html += '<h3 class="rd-h3">Konto</h3><div class="rd-settingsbtns">' +
    '<button class="rd-settingsbtn" data-action="refresh-sheet">&#8635; Odśwież dane</button>' +
    '<button class="rd-settingsbtn" data-action="sign-out">Wyloguj</button></div>';

  html += '<h3 class="rd-h3">Kopia zapasowa (lokalny plik)</h3><div class="rd-settingsbtns">' +
    '<button class="rd-settingsbtn" data-action="export-json">&#8595; JSON</button>' +
    '<button class="rd-settingsbtn" data-action="export-csv">&#8595; CSV</button></div>';

  if(state.settingsStatus) html += '<p class="rd-status">'+escapeHTML(state.settingsStatus)+'</p>';
  html += '</div></div>';
  return html;
}

/* ============================== ACTIONS ============================== */
function handleClick(e){
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const action = el.getAttribute("data-action");
  if(action==="noop") return;

  if(action==="do-signin"){ doSignIn(); return; }
  if(action==="sign-out"){ state.settingsOpen=false; doSignOut(); return; }

  if(action==="set-tab"){ state.activeTab = el.getAttribute("data-tab"); state.expandedItem=null; render(); return; }
  if(action==="open-settings"){ state.settingsOpen = true; state.settingsStatus=""; state.manageListId=null; render(); return; }
  if(action==="close-settings" || action==="close-settings-overlay"){ state.settingsOpen = false; state.manageListId=null; render(); return; }
  if(action==="nav-date"){ state.viewDate = addDays(state.viewDate, parseInt(el.getAttribute("data-dir"),10)); state.expandedItem=null; render(); return; }
  if(action==="nav-date-today"){ state.viewDate = todayStr(); state.expandedItem=null; render(); return; }
  if(action==="jump-cat"){
    const target = document.getElementById("cat-"+el.getAttribute("data-cat"));
    if(target) target.scrollIntoView({behavior:"smooth", block:"start"});
    return;
  }
  if(action==="jump-date"){ state.viewDate = el.getAttribute("data-date"); state.activeTab="today"; state.expandedItem=null; render(); return; }
  if(action==="toggle-cat"){ const c=el.getAttribute("data-cat"); state.collapsedCats[c]=!state.collapsedCats[c]; render(); return; }
  if(action==="toggle-expand"){ const id=el.getAttribute("data-item"); state.expandedItem = state.expandedItem===id ? null : id; render(); return; }

  if(action==="toggle-done"){
    const id = el.getAttribute("data-item");
    updateDayItem(state.viewDate, id, function(d){ return { ...d, done: !d.done }; });
    render(); return;
  }
  if(action==="toggle-sub"){
    const id = el.getAttribute("data-item");
    const idx = parseInt(el.getAttribute("data-sub-index"),10);
    const meta = findItemMeta(id);
    const subs = getEffectiveList(meta);
    const label = subs[idx];
    updateDayItem(state.viewDate, id, function(d){
      const cur = !!(d.subDone && d.subDone[label]);
      return { ...d, subDone: { ...(d.subDone||{}), [label]: !cur } };
    });
    render(); return;
  }
  if(action==="recipe-addon-toggle"){
    const id = el.getAttribute("data-item");
    const addonId = el.getAttribute("data-addon");
    updateDayItem(state.viewDate, id, function(d){
      const addons = { ...(d.addons||{}) };
      if(el.checked){ addons[addonId] = { variants:{} }; } else { delete addons[addonId]; }
      return { ...d, addons: addons };
    });
    render(); return;
  }
  if(action==="add-log"){
    const id = el.getAttribute("data-item");
    const ex = document.getElementById("logdraft-"+id+"-exercise").value.trim();
    const w = document.getElementById("logdraft-"+id+"-weight").value.trim();
    const r = document.getElementById("logdraft-"+id+"-reps").value.trim();
    if(!ex) return;
    updateDayItem(state.viewDate, id, function(d){ return { ...d, logEntries: [...(d.logEntries||[]), {exercise:ex, weight:w, reps:r}] }; });
    render(); return;
  }
  if(action==="remove-log"){
    const id = el.getAttribute("data-item");
    const idx = parseInt(el.getAttribute("data-idx"),10);
    updateDayItem(state.viewDate, id, function(d){ return { ...d, logEntries: (d.logEntries||[]).filter(function(_,i){return i!==idx;}) }; });
    render(); return;
  }

  if(action==="filter-notes"){ state.notesFilter = el.getAttribute("data-cat"); render(); return; }
  if(action==="set-range"){ state.dashRange = el.getAttribute("data-range"); render(); return; }

  if(action==="pick-list"){ state.manageListId = el.getAttribute("data-item"); render(); return; }
  if(action==="add-list-item"){
    const input = document.getElementById("new-list-item-input");
    const v = input.value.trim();
    const item = findItemMeta(state.manageListId);
    const cur = getEffectiveList(item);
    if(!v || cur.includes(v)) return;
    saveEffectiveList(item, [...cur, v]);
    render(); return;
  }
  if(action==="remove-list-item"){
    const idx = parseInt(el.getAttribute("data-idx"),10);
    const item = findItemMeta(state.manageListId);
    const cur = getEffectiveList(item);
    saveEffectiveList(item, cur.filter(function(_,i){return i!==idx;}));
    render(); return;
  }
  if(action==="refresh-sheet"){
    state.settingsStatus = "Odświeżanie…";
    render();
    fetchAllRows().then(function(){ state.settingsStatus = "Dane odświeżone."; render(); })
      .catch(function(){ state.settingsStatus = "Nie udało się odświeżyć — sprawdź internet."; render(); });
    return;
  }

  if(action==="export-json"){
    const days = {};
    listDates().forEach(function(d){ days[d] = getDayItems(d); });
    const lists = {};
    ALL_ITEMS.filter(function(it){return it.editable;}).forEach(function(it){ lists[it.id] = getEffectiveList(it); });
    const bundle = { exportedAt: new Date().toISOString(), lists: lists, days: days };
    downloadFile("rytualy-dnia-"+todayStr()+".json", JSON.stringify(bundle,null,2), "application/json");
    state.settingsStatus = "Wyeksportowano "+Object.keys(days).length+" dni.";
    render(); return;
  }
  if(action==="export-csv"){
    const rows = [["Data","Kategoria","Aktywność","Zrobione","Notatka / wartość"]];
    listDates().sort().forEach(function(dateStr){
      const dayItems = getDayItems(dateStr).items;
      CATEGORIES.forEach(function(cat){
        cat.items.forEach(function(item){
          const d = dayItems[item.id] || {};
          const done = isItemDone(item,d) ? "tak" : "nie";
          let value = "";
          if(item.type==="note") value = d.note||"";
          else if(item.type==="nested") value = getEffectiveList(item).filter(function(s){return d.subDone&&d.subDone[s];}).join("; ");
          else if(item.type==="log") value = (d.logEntries||[]).map(function(en){return (en.exercise||"")+" "+(en.weight||"")+" x"+(en.reps||"");}).join(" | ");
          else if(item.type==="meal") value = d.mealValue||"";
          else if(item.type==="recipe_meal") value = describeMealSelection(d);
          rows.push([dateStr, cat.name, item.name, done, value]);
        });
      });
    });
    const csv = rows.map(function(r){return r.map(csvEscape).join(",");}).join("\\n");
    downloadFile("rytualy-dnia-"+todayStr()+".csv", csv, "text/csv");
    state.settingsStatus = "Wyeksportowano.";
    render(); return;
  }
}

function handleChange(e){
  const el = e.target;
  const action = el.getAttribute && el.getAttribute("data-action");
  if(action==="meal-select"){
    const id = el.getAttribute("data-item");
    updateDayItem(state.viewDate, id, function(d){ return { ...d, mealValue: el.value }; });
    render(); return;
  }
  if(action==="recipe-select"){
    const id = el.getAttribute("data-item");
    updateDayItem(state.viewDate, id, function(d){ return { recipeId: el.value, variants:{}, addons: d.addons||{} }; });
    render(); return;
  }
  if(action==="recipe-variant-select"){
    const id = el.getAttribute("data-item");
    const group = el.getAttribute("data-group");
    updateDayItem(state.viewDate, id, function(d){ return { ...d, variants: { ...(d.variants||{}), [group]: el.value } }; });
    render(); return;
  }
  if(action==="recipe-addon-variant"){
    const id = el.getAttribute("data-item");
    const addonId = el.getAttribute("data-addon");
    const group = el.getAttribute("data-group");
    updateDayItem(state.viewDate, id, function(d){
      const addons = { ...(d.addons||{}) };
      const cur = addons[addonId] || { variants:{} };
      addons[addonId] = { variants: { ...(cur.variants||{}), [group]: el.value } };
      return { ...d, addons: addons };
    });
    render(); return;
  }
  if(action==="set-custom-start"){ state.dashCustomStart = el.value; render(); return; }
  if(action==="set-custom-end"){ state.dashCustomEnd = el.value; render(); return; }
  if(action==="set-shop-start"){ state.shopStart = el.value; render(); return; }
  if(action==="set-shop-end"){ state.shopEnd = el.value; render(); return; }
}

let noteTimer = null;
function handleInput(e){
  const el = e.target;
  const itemId = el.getAttribute && el.getAttribute("data-note-item");
  if(itemId){
    const val = el.value;
    if(noteTimer) clearTimeout(noteTimer);
    noteTimer = setTimeout(function(){ updateDayItem(state.viewDate, itemId, function(d){ return { ...d, note: val }; }); }, 600);
  }
}
function handleBlur(e){
  const el = e.target;
  const itemId = el.getAttribute && el.getAttribute("data-note-item");
  if(itemId){
    if(noteTimer) clearTimeout(noteTimer);
    updateDayItem(state.viewDate, itemId, function(d){ return { ...d, note: el.value }; });
  }
}

document.body.addEventListener("click", handleClick);
document.body.addEventListener("change", handleChange);
document.body.addEventListener("input", handleInput);
document.body.addEventListener("focusout", handleBlur, true);

    currentUser = user;
    state.screen = "loading";
    render();
    fetchAllRows().then(function(){
      state.screen = "app";
      render();
    }).catch(function(e){
      state.screen = "error";
      state.errorMsg = (e && e.message) ? e.message : "Nie udało się wczytać danych.";
      render();
    });
  } else {
    currentUser = null;
    state.screen = "signin";
    render();
  }
});
